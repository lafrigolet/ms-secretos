  # ── Audit Service ────────────────────────────────────────────────
  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    expose:
      - "3009"
    ports:
      - "${AUDIT_SERVICE_PORT:-3009}:3009"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
