  # ── Invoice Service ──────────────────────────────────────────────
  invoice-service:
    build:
      context: ./services/invoice-service
      dockerfile: Dockerfile
    expose:
      - "3008"
    ports:
      - "${INVOICE_SERVICE_PORT:-3008}:3008"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3008
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - SAP_INTEGRATION_URL=${SAP_INTEGRATION_SERVICE_URL:-http://sap-integration-service:3010}
    networks:
      - sda-network
    depends_on:
      - sap-integration-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/health"]
      interval: 30s
