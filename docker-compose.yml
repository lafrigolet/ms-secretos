version: '3.9'

# ══════════════════════════════════════════════════════════════════
# Secretos del Agua — Docker Compose (desarrollo local)
# ══════════════════════════════════════════════════════════════════
#
# Arrancar todo:              docker compose up --build
# Solo auth + frontend:       docker compose up --build nginx frontend auth-service
# Logs de un servicio:        docker compose logs -f auth-service
# Reconstruir un servicio:    docker compose up --build auth-service

networks:
  sda-network:
    driver: bridge

services:

  # ── Nginx (reverse proxy) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
    networks:
      - sda-network
    restart: unless-stopped

  # ── Frontend (React + Vite) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "5173"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    volumes:
      - ./frontend/src:/app/src        # hot-reload: cambios en src se reflejan al instante
    networks:
      - sda-network
    restart: unless-stopped

  # ── Auth Service ────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    expose:
      - "3001"
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"   # acceso directo para pruebas y /docs
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - SAP_INTEGRATION_URL=${SAP_INTEGRATION_SERVICE_URL:-http://sap-integration-service:3010}
    networks:
      - sda-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

