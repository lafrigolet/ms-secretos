# ══════════════════════════════════════════════════════════════════
# Secretos del Agua — Docker Compose (desarrollo local)
# ══════════════════════════════════════════════════════════════════
#
# Arrancar todo:              docker compose up --build
# Solo auth + frontend:       docker compose up --build nginx frontend auth-service
# Logs de un servicio:        docker compose logs -f auth-service
# Reconstruir un servicio:    docker compose up --build auth-service

networks:
  sda-network:
    driver: bridge

services:

  # ── Nginx (reverse proxy) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
    networks:
      - sda-network
    restart: unless-stopped

  # ── Dev Stack Dashboard ─────────────────────────────────────────
  dev-stack:
    build:
      context: ./dev-stack
      dockerfile: Dockerfile
    expose:
      - "5174"
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=development
    volumes:
      - ./dev-stack/src:/app/src
    networks:
      - sda-network
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "5173"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    volumes:
      - ./frontend/src:/app/src        # hot-reload: cambios en src se reflejan al instante
    networks:
      - sda-network
    restart: unless-stopped

  # ── Returns Service ─────────────────────────────────────────────
  returns-service:
    build:
      context: ./services/returns-service
      dockerfile: Dockerfile
    expose:
      - "3011"
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3011
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - SAP_INTEGRATION_URL=${SAP_INTEGRATION_SERVICE_URL:-http://sap-integration-service:3010}
    networks:
      - sda-network
    depends_on:
      - sap-integration-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Auth Service ─────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    expose:
      - "3001"
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"   # acceso directo para pruebas y /docs
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - SAP_INTEGRATION_URL=${SAP_INTEGRATION_SERVICE_URL:-http://sap-integration-service:3010}
    networks:
      - sda-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Catalog Service ──────────────────────────────────────────────
  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    expose:
      - "3002"
    ports:
      - "${CATALOG_SERVICE_PORT:-3002}:3002"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3002
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - SAP_INTEGRATION_URL=${SAP_INTEGRATION_SERVICE_URL:-http://sap-integration-service:3010}
    networks:
      - sda-network
    depends_on:
      - sap-integration-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Customer Profile Service ────────────────────────────────────
  customer-profile-service:
    build:
      context: ./services/customer-profile-service
      dockerfile: Dockerfile
    expose:
      - "3003"
    ports:
      - "${CUSTOMER_PROFILE_SERVICE_PORT:-3003}:3003"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3003
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - SAP_INTEGRATION_URL=${SAP_INTEGRATION_SERVICE_URL:-http://sap-integration-service:3010}
    networks:
      - sda-network
    depends_on:
      - sap-integration-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Promotions Service ───────────────────────────────────────────
  promotions-service:
    build:
      context: ./services/promotions-service
      dockerfile: Dockerfile
    expose:
      - "3004"
    ports:
      - "${PROMOTIONS_SERVICE_PORT:-3004}:3004"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3004
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - sda-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Cart Service ─────────────────────────────────────────────────
  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    expose:
      - "3005"
    ports:
      - "${CART_SERVICE_PORT:-3005}:3005"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3005
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - PROMOTIONS_SERVICE_URL=${PROMOTIONS_SERVICE_URL:-http://promotions-service:3004}
    networks:
      - sda-network
    depends_on:
      - promotions-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Order Service ────────────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    expose:
      - "3006"
    ports:
      - "${ORDER_SERVICE_PORT:-3006}:3006"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3006
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - SAP_INTEGRATION_URL=${SAP_INTEGRATION_SERVICE_URL:-http://sap-integration-service:3010}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL:-http://notification-service:3007}
      - AUDIT_SERVICE_URL=${AUDIT_SERVICE_URL:-http://audit-service:3009}
    networks:
      - sda-network
    depends_on:
      - sap-integration-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Notification Service ─────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    expose:
      - "3007"
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3007}:3007"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3007
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - sda-network
    restart: unless-stopped
