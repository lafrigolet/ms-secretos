name: CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ── Test ────────────────────────────────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - audit-service
          - auth-service
          - cart-service
          - catalog-service
          - commercial-service
          - content-service
          - customer-profile-service
          - intelligence-service
          - invoice-service
          - notification-preferences-service
          - notification-service
          - order-service
          - promotions-service
          - returns-service
          - sap-integration-service
          - sustainability-service
          - subscription-service

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Audit dependencies
        # GHSA-mvf2-f6gm-w987: fast-jwt RSA algorithm confusion, no fix available.
        # GHSA-hm7r-c7qw-ghp6: fast-jwt accepts unknown crit header extensions, no fix available.
        # Both affect fast-jwt <=6.1.0. Project uses HMAC only — neither attack vector applies.
        # Allowlisted specifically so all other high/critical vulnerabilities still fail the build.
        run: npm run audit -- ${{ matrix.service }}

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci

  # ── Integration Tests ────────────────────────────────────────────────
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Run integration tests
        run: npm run integrationtest
        env:
          JWT_SECRET: test-secret-for-ci

  # ── Build & Push ─────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: integration-test

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - audit-service
          - auth-service
          - cart-service
          - catalog-service
          - commercial-service
          - content-service
          - customer-profile-service
          - intelligence-service
          - invoice-service
          - notification-preferences-service
          - notification-service
          - order-service
          - promotions-service
          - returns-service
          - sap-integration-service
          - sustainability-service
          - subscription-service

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ── Build & Push Frontend ────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: integration-test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/sda-frontend:latest

  # ── Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: [build, build-frontend]

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/ms-secretos
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
