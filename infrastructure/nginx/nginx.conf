upstream auth_service             { server auth-service:3001; }
upstream catalog_service          { server catalog-service:3002; }
upstream customer_profile_service { server customer-profile-service:3003; }
upstream promotions_service       { server promotions-service:3004; }
upstream cart_service             { server cart-service:3005; }
upstream order_service            { server order-service:3006; }
upstream notification_service     { server notification-service:3007; }
upstream invoice_service          { server invoice-service:3008; }
upstream audit_service            { server audit-service:3009; }
upstream sap_integration_service  { server sap-integration-service:3010; }
upstream returns_service            { server returns-service:3011; }
upstream content_service            { server content-service:3012; }
upstream intelligence_service       { server intelligence-service:3013; }
upstream frontend                 { server frontend:5173; }
upstream dev_stack                { server dev-stack:5174; }

server {
    listen 80;
    server_name localhost;

    location /dev-stack {
        proxy_pass http://dev_stack;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /ms {
        proxy_pass http://dev_stack;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/auth/        { proxy_pass http://auth_service/auth/;                   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/catalog/     { proxy_pass http://catalog_service/catalog/;             proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/profile/     { proxy_pass http://customer_profile_service/profile/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/promotions/  { proxy_pass http://promotions_service/promotions/;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/cart/        { proxy_pass http://cart_service/cart/;                   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/orders/      { proxy_pass http://order_service/orders/;               proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/invoices/    { proxy_pass http://invoice_service/invoices/;           proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/returns/     { proxy_pass http://returns_service/returns/;            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/admin/returns/ { proxy_pass http://returns_service/admin/returns/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/content/     { proxy_pass http://content_service/content/;            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/admin/content/ { proxy_pass http://content_service/admin/content/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/intelligence/ { proxy_pass http://intelligence_service/intelligence/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    location /api/auth-health          { proxy_pass http://auth_service/health; }
    location /api/catalog-health       { proxy_pass http://catalog_service/health; }
    location /api/profile-health       { proxy_pass http://customer_profile_service/health; }
    location /api/promotions-health    { proxy_pass http://promotions_service/health; }
    location /api/cart-health          { proxy_pass http://cart_service/health; }
    location /api/orders-health        { proxy_pass http://order_service/health; }
    location /api/notifications-health { proxy_pass http://notification_service/health; }
    location /api/invoices-health      { proxy_pass http://invoice_service/health; }
    location /api/returns-health       { proxy_pass http://returns_service/health; }
    location /api/content-health       { proxy_pass http://content_service/health; }
    location /api/intelligence-health  { proxy_pass http://intelligence_service/health; }
    location /api/audit-health         { proxy_pass http://audit_service/health; }
    location /api/sap-health           { proxy_pass http://sap_integration_service/health; }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
