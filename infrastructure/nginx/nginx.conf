upstream auth_service             { server auth-service:3001; }
upstream catalog_service          { server catalog-service:3002; }
upstream customer_profile_service { server customer-profile-service:3003; }
upstream promotions_service       { server promotions-service:3004; }
upstream cart_service             { server cart-service:3005; }
upstream order_service            { server order-service:3006; }
upstream notification_service     { server notification-service:3007; }
upstream invoice_service          { server invoice-service:3008; }
upstream audit_service            { server audit-service:3009; }
upstream sap_integration_service  { server sap-integration-service:3010; }
upstream frontend                 { server frontend:5173; }

server {
    listen 80;
    server_name localhost;

    # ── Frontend ──────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Auth ──────────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://auth_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/auth-health {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
    }

    # ── Catalog ───────────────────────────────────────────────────
    location /api/catalog/ {
        proxy_pass http://catalog_service/catalog/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/catalog-health {
        proxy_pass http://catalog_service/health;
        proxy_set_header Host $host;
    }

    # ── Customer Profile ──────────────────────────────────────────
    location /api/profile/ {
        proxy_pass http://customer_profile_service/profile/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/profile-health {
        proxy_pass http://customer_profile_service/health;
        proxy_set_header Host $host;
    }

    # ── Promotions ────────────────────────────────────────────────
    location /api/promotions/ {
        proxy_pass http://promotions_service/promotions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/promotions-health {
        proxy_pass http://promotions_service/health;
        proxy_set_header Host $host;
    }

    # ── Cart ──────────────────────────────────────────────────────
    location /api/cart/ {
        proxy_pass http://cart_service/cart/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/cart-health {
        proxy_pass http://cart_service/health;
        proxy_set_header Host $host;
    }

    # ── Orders ────────────────────────────────────────────────────
    location /api/orders/ {
        proxy_pass http://order_service/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/orders-health {
        proxy_pass http://order_service/health;
        proxy_set_header Host $host;
    }

    # ── Invoices ──────────────────────────────────────────────────
    location /api/invoices/ {
        proxy_pass http://invoice_service/invoices/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/invoices-health {
        proxy_pass http://invoice_service/health;
        proxy_set_header Host $host;
    }

    # ── Audit ─────────────────────────────────────────────────────
    location /api/audit-health {
        proxy_pass http://audit_service/health;
        proxy_set_header Host $host;
    }

    # ── SAP Integration ───────────────────────────────────────────
    location /api/sap-health {
        proxy_pass http://sap_integration_service/health;
        proxy_set_header Host $host;
    }
}
