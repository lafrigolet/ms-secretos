# Integration test overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.integration.yml up -d
#
# All services already default to NODE_ENV=development and SAP_MODE=stub.
# This file pins the JWT_SECRET and disables the frontend / dev-stack
# (not needed for API integration tests).

services:
  auth-service:
    environment:
      - JWT_SECRET=${JWT_SECRET:-integration-test-secret}

  catalog-service:
    environment:
      - JWT_SECRET=${JWT_SECRET:-integration-test-secret}

